  aeterna-prereqs:
  - annotations:
      artifacthub.io/category: ai-machine-learning
      artifacthub.io/license: Apache-2.0
    apiVersion: v2
    appVersion: 0.8.0-rc.2
    created: "2026-04-20T00:40:46.846150537Z"
    dependencies:
    - alias: dragonfly
      condition: cache.dragonfly.enabled
      name: dragonfly
      repository: oci://ghcr.io/dragonflydb/dragonfly/helm
      version: v1.37.0
    - alias: qdrant
      condition: vectorStore.qdrant.enabled
      name: qdrant
      repository: https://qdrant.github.io/qdrant-helm
      version: 0.10.*
    - alias: valkey
      condition: cache.valkey.enabled
      name: valkey
      repository: https://valkey.io/valkey-helm/
      version: 0.9.*
    description: Prerequisites for Aeterna — deploys PostgreSQL (CloudNativePG), Redis-compatible
      cache (Dragonfly or Valkey), and vector store (Qdrant) for development and testing
      environments.
