## Aeterna Prerequisites Chart Values
## Deploys backing services for dev/test environments.
## Use this chart to provision PostgreSQL, Redis cache, and vector store,
## then point the main aeterna chart at them.

## ==========================================================================
## PostgreSQL (CloudNativePG)
## ==========================================================================
postgresql:
  ## @param postgresql.enabled Enable PostgreSQL via CloudNativePG
  enabled: true
  ## @param postgresql.instances Number of PostgreSQL instances
  instances: 1
  ## @param postgresql.imageName PostgreSQL image (leave empty for operator default)
  imageName: ""
  ## @param postgresql.database Database name
  database: "aeterna"
  ## @param postgresql.owner Database owner
  owner: "aeterna"
  storage:
    ## @param postgresql.storage.size Storage size per instance
    size: 10Gi
    ## @param postgresql.storage.storageClass Storage class (empty = cluster default)
    storageClass: ""
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
  ## PostgreSQL engine parameters
  parameters: {}
  ## Custom pg_hba entries
  pg_hba: []
  ## Backup configuration (CloudNativePG native)
  backup:
    ## @param postgresql.backup.enabled Enable CNPG native backup
    enabled: false
    ## @param postgresql.backup.schedule Backup cron schedule
    schedule: "0 2 * * *"
    ## @param postgresql.backup.retentionPolicy Backup retention policy
    retentionPolicy: "30d"
    ## @param postgresql.backup.provider Backup provider: s3, gcs, azure
    provider: "s3"
    ## @param postgresql.backup.destinationPath Full backup destination path
    destinationPath: ""
    ## @param postgresql.backup.endpointURL Custom S3-compatible endpoint URL
    endpointURL: ""
    s3Credentials:
      accessKeyId:
        name: ""
        key: "ACCESS_KEY_ID"
      secretAccessKey:
        name: ""
        key: "ACCESS_SECRET_KEY"
    googleCredentials:
      applicationCredentials:
        name: ""
        key: "gcs-credentials"
    azureCredentials:
      storageAccount:
        name: ""
        key: "AZURE_STORAGE_ACCOUNT"
      storageKey:
        name: ""
        key: "AZURE_STORAGE_KEY"

## ==========================================================================
## Cache (Redis-compatible)
## ==========================================================================
cache:
  ## @param cache.type Cache backend: dragonfly or valkey
  type: dragonfly

  ## Dragonfly configuration (Redis-compatible, default)
  dragonfly:
    ## @param cache.dragonfly.enabled Enable Dragonfly
    enabled: true
    ## @param cache.dragonfly.replicas Number of Dragonfly replicas
    replicas: 1
    ## @param cache.dragonfly.args Additional Dragonfly arguments
    args: []

  ## Valkey configuration (alternative Redis fork)
  valkey:
    ## @param cache.valkey.enabled Enable Valkey (mutually exclusive with dragonfly)
    enabled: false

## ==========================================================================
## Vector Store
## ==========================================================================
vectorStore:
  ## @param vectorStore.type Vector store backend: qdrant or none
  type: qdrant

  ## Qdrant configuration
  qdrant:
    ## @param vectorStore.qdrant.enabled Enable Qdrant
    enabled: true

## ==========================================================================
## Connection Secret
## ==========================================================================
## The chart creates a Kubernetes Secret with connection info for the main
## aeterna chart to consume.
connectionSecret:
  ## @param connectionSecret.name Name of the connection secret
  name: ""
  ## @param connectionSecret.create Create the connection secret
  create: true

## ==========================================================================
## Subchart overrides
## ==========================================================================

## Dragonfly subchart
dragonfly:
  enabled: true
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi

## Qdrant subchart
qdrant:
  enabled: true
  replicaCount: 1
  persistence:
    size: 10Gi
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 2000
    allowPrivilegeEscalation: false
    privileged: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  podSecurityContext:
    fsGroup: 3000
    fsGroupChangePolicy: Always
    seccompProfile:
      type: RuntimeDefault
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 50m
      memory: 256Mi

## Valkey subchart (alternative to Dragonfly)
valkey:
  enabled: false
  architecture: standalone
  auth:
    enabled: true
    existingSecret: ""
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi

## OpenBao subchart (secrets backend for Aeterna)
## https://github.com/openbao/openbao-helm
##
## Three deployment modes are supported via `openbao.mode`:
##
##   internal-dev-seal  — single pod, in-memory dev mode, root token = "root".
##                        Data is ephemeral. ONLY for ephemeral CI / e2e clusters.
##                        REQUIRES: openbao.server.dev.enabled=true
##
##   internal-shamir    — single pod with file storage and Shamir unseal.
##                        Bootstrap Job stores 1 unseal key + root token in a Secret.
##                        Convenient for shared dev clusters; NOT production-grade.
##                        REQUIRES: openbao.server.standalone.enabled=true
##
##   external           — assumes the embedded OpenBao subchart is configured with
##                        an external auto-unseal seal stanza (e.g. AWS KMS, GCP KMS,
##                        Azure Key Vault, Transit). Bootstrap Job runs init only.
##                        Suitable for production with proper operator review.
##
## The bootstrap Job writes connection info into a Secret consumed by the Aeterna
## chart via `vault.bootstrapSecretName`. See the Aeterna chart for wiring details.
openbao:
  enabled: false
  ## Deployment mode — gates the bootstrap Job behaviour.
  ## One of: internal-dev-seal | internal-shamir | external
  mode: internal-dev-seal

  ## Bootstrap Job — runs once on `helm install/upgrade` to initialise OpenBao,
  ## persist credentials into a Secret, and enable a kv-v2 mount at `secret/`.
  bootstrap:
    enabled: true
    ## Container image used by the bootstrap Job. Must include `bao` and `kubectl`.
    image:
      repository: openbao/openbao
      tag: "2.5.3"
      pullPolicy: IfNotPresent
    ## Override the generated Secret name (default: <release>-openbao-bootstrap).
    secretName: ""
    ## KV-v2 mount path to enable post-init.
    kvPath: "secret"
    ## Helm hook weight + delete-policy. Default: hook on post-install,post-upgrade.
    hookWeight: 5
    ## ServiceAccount + RBAC scope (namespace-local).
    serviceAccount:
      create: true
      name: ""
    resources:
      limits:
        cpu: 200m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
    securityContext:
      runAsNonRoot: true
      runAsUser: 100
      runAsGroup: 1000
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault

  ## --- Below: passthrough to the upstream openbao chart ---
  ## Defaults shown match `mode: internal-dev-seal`. Override per-mode as needed.
  ## See: https://github.com/openbao/openbao-helm/blob/main/charts/openbao/values.yaml
  global:
    enabled: true
  injector:
    enabled: false
  csi:
    enabled: false
  server:
    image:
      repository: openbao/openbao
      tag: "2.5.3"
    dev:
      enabled: true
      devRootToken: "root"
    standalone:
      enabled: false
    ha:
      enabled: false
    dataStorage:
      enabled: false
    auditStorage:
      enabled: false
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi
