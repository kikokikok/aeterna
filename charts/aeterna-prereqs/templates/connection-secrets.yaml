{{- if .Values.connectionSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "prereqs.connectionSecretName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "prereqs.labels" . | nindent 4 }}
  annotations:
    ## These annotations help operators identify what this secret provides.
    aeterna.io/purpose: "connection-info"
    aeterna.io/chart: "aeterna-prereqs"
type: Opaque
stringData:
  ## PostgreSQL connection info
  {{- if .Values.postgresql.enabled }}
  postgresql-host: {{ include "prereqs.postgresql.host" . | quote }}
  postgresql-port: "5432"
  postgresql-database: {{ .Values.postgresql.database | default "aeterna" | quote }}
  postgresql-username: {{ .Values.postgresql.owner | default "aeterna" | quote }}
  {{- end }}

  ## Redis/cache connection info
  redis-host: {{ include "prereqs.redis.host" . | quote }}
  redis-port: "6379"

  ## Vector store connection info
  {{- if .Values.vectorStore.qdrant.enabled }}
  vectorstore-type: "qdrant"
  vectorstore-host: {{ include "prereqs.vectorStore.host" . | quote }}
  vectorstore-port: {{ include "prereqs.vectorStore.port" . | quote }}
  {{- end }}
{{- end }}
