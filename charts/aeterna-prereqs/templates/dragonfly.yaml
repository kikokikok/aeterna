{{- if .Values.cache.dragonfly.enabled }}
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: {{ include "prereqs.fullname" . }}-dragonfly
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "prereqs.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.cache.dragonfly.replicas | default 1 }}

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi

  {{- if gt (int (.Values.cache.dragonfly.replicas | default 1)) 1 }}
  replication:
    enabled: true
  {{- end }}
{{- end }}
