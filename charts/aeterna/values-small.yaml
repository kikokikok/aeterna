# Small deployment - single replicas, minimal resources (< 1,000 memories)
deploymentMode: local

aeterna:
  enabled: true
  replicaCount: 1
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  autoscaling:
    enabled: false
    vpa:
      enabled: false
  pdb:
    enabled: false

postgresql:
  bundled: true
  cloudnativepg:
    instances: 1
    storage:
      size: 5Gi

qdrant:
  enabled: true
  replicaCount: 1
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  persistence:
    enabled: true
    size: 5Gi

vectorBackend:
  type: qdrant

dragonfly:
  enabled: true
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

cache:
  type: dragonfly

opal:
  enabled: true
  server:
    replicaCount: 1
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi

backup:
  enabled: false

networkPolicy:
  enabled: false

observability:
  serviceMonitor:
    enabled: false
