## Aeterna Helm Chart Values
## Application-only chart — stateful services are provided externally.
## For dev/test backends, use the aeterna-prereqs chart.

## ==========================================================================
## EXTERNAL SERVICE CONNECTIONS (REQUIRED)
## ==========================================================================
## Aeterna requires PostgreSQL, a Redis-compatible cache, and a vector store.
## Provide connection details for pre-existing instances.
## For development, use the aeterna-prereqs chart to deploy these services.

## PostgreSQL connection
postgresql:
  ## @param postgresql.host PostgreSQL hostname
  host: ""
  ## @param postgresql.port PostgreSQL port
  port: 5432
  ## @param postgresql.database Database name
  database: "aeterna"
  ## @param postgresql.username Database username
  username: "aeterna"
  ## @param postgresql.existingSecret Kubernetes Secret containing the password (key: password)
  existingSecret: ""
  ## @param postgresql.passwordKey Key in the secret containing the password
  passwordKey: "password"
  ## @param postgresql.sslMode SSL mode for PostgreSQL connection
  sslMode: "prefer"

## Redis-compatible cache connection (Redis, Dragonfly, Valkey, ElastiCache)
redis:
  ## @param redis.host Redis hostname
  host: ""
  ## @param redis.port Redis port
  port: 6379
  ## @param redis.existingSecret Kubernetes Secret containing the password (key: password)
  existingSecret: ""
  ## @param redis.passwordKey Key in the secret containing the password
  passwordKey: "password"
  ## @param redis.tls Enable TLS for Redis connection
  tls: false

## Vector store connection
vectorStore:
  ## @param vectorStore.type Vector store type: qdrant, weaviate, pgvector, pinecone, mongodb, vertexai, databricks
  type: "qdrant"
  ## @param vectorStore.host Vector store hostname (not needed for pgvector, pinecone, vertexai, databricks)
  host: ""
  ## @param vectorStore.port Vector store port (6333 for Qdrant, 8080 for Weaviate)
  port: 6333
  ## @param vectorStore.existingSecret Kubernetes Secret containing API key (if needed)
  existingSecret: ""
  ## @param vectorStore.apiKeyKey Key in the secret containing the API key
  apiKeyKey: "api-key"

  ## Pinecone-specific configuration (when type=pinecone)
  pinecone:
    ## @param vectorStore.pinecone.environment Pinecone environment
    environment: ""
    ## @param vectorStore.pinecone.indexName Pinecone index name
    indexName: "aeterna"

  ## Vertex AI-specific configuration (when type=vertexai)
  vertexai:
    ## @param vectorStore.vertexai.project GCP project ID
    project: ""
    ## @param vectorStore.vertexai.region GCP region
    region: "us-central1"
    ## @param vectorStore.vertexai.endpoint Vertex AI endpoint ID
    endpoint: ""

  ## Databricks-specific configuration (when type=databricks)
  databricks:
    ## @param vectorStore.databricks.workspaceUrl Databricks workspace URL
    workspaceUrl: ""
    ## @param vectorStore.databricks.catalog Unity Catalog name
    catalog: ""

## ==========================================================================
## DEPLOYMENT CONFIGURATION
## ==========================================================================

## Deployment mode configuration
## @param deploymentMode Deployment mode: local (all components), hybrid (local cache + remote), remote (thin client)
deploymentMode: local

## Central server configuration (required for hybrid/remote modes)
central:
  ## @param central.url Central Aeterna server URL
  url: ""
  ## @param central.auth Authentication method: apiKey, oauth2, serviceAccount
  auth: apiKey
  ## @param central.apiKey API key for central server (use existingSecret in production)
  apiKey: ""
  ## @param central.existingSecret Name of existing secret containing central server credentials
  existingSecret: ""
  ## @param central.secretKey Key in the secret containing the API key
  secretKey: "api-key"

## Aeterna server configuration
aeterna:
  ## @param aeterna.enabled Enable Aeterna server deployment
  enabled: true

  ## @param aeterna.replicaCount Number of replicas
  replicaCount: 1

  image:
    ## @param aeterna.image.repository Image repository
    repository: ghcr.io/kikokikok/aeterna
    ## @param aeterna.image.tag Image tag (defaults to chart appVersion)
    tag: ""
    ## @param aeterna.image.pullPolicy Image pull policy
    pullPolicy: IfNotPresent

  ## @param aeterna.imagePullSecrets Docker registry secrets
  imagePullSecrets: []

  ## @param aeterna.nameOverride Override chart name
  nameOverride: ""
  ## @param aeterna.fullnameOverride Override full name
  fullnameOverride: ""

  name: ""

  ## Service account configuration
  serviceAccount:
    ## @param aeterna.serviceAccount.create Create service account
    create: true
    ## @param aeterna.serviceAccount.automount Automount service account token
    automount: true
    ## @param aeterna.serviceAccount.annotations Service account annotations
    annotations: {}
    ## @param aeterna.serviceAccount.name Service account name
    name: ""

  ## @param aeterna.podAnnotations Pod annotations
  podAnnotations: {}

  ## @param aeterna.podLabels Additional pod labels
  podLabels: {}

  ## Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  ## Container security context
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  ## Service configuration
  service:
    ## @param aeterna.service.type Service type
    type: ClusterIP
    ## @param aeterna.service.port Service port
    port: 8080
    ## @param aeterna.service.metricsPort Metrics port for Prometheus
    metricsPort: 9090

  ## Ingress configuration
  ingress:
    ## @param aeterna.ingress.enabled Enable ingress
    enabled: false
    ## @param aeterna.ingress.className Ingress class name
    className: ""
    ## @param aeterna.ingress.annotations Ingress annotations
    annotations: {}
    ## @param aeterna.ingress.hosts Ingress hosts
    hosts:
      - host: aeterna.local
        paths:
          - path: /
            pathType: Prefix
    ## @param aeterna.ingress.tls Ingress TLS configuration
    tls: []

  ## Resource limits and requests
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

  ## Probes configuration
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  startupProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30

  ## Autoscaling configuration
  autoscaling:
    ## @param aeterna.autoscaling.enabled Enable HPA
    enabled: true
    ## @param aeterna.autoscaling.minReplicas Minimum replicas
    minReplicas: 2
    ## @param aeterna.autoscaling.maxReplicas Maximum replicas
    maxReplicas: 10
    ## @param aeterna.autoscaling.targetCPUUtilizationPercentage Target CPU utilization
    targetCPUUtilizationPercentage: 70
    ## @param aeterna.autoscaling.targetMemoryUtilizationPercentage Target memory utilization
    targetMemoryUtilizationPercentage: 80

  ## Vertical Pod Autoscaler (VPA) configuration
  ## Requires VPA controller to be installed in the cluster
    vpa:
      ## @param aeterna.autoscaling.vpa.enabled Enable VPA
      enabled: false
      ## @param aeterna.autoscaling.vpa.updateMode VPA update mode: Auto, Recreate, Initial, Off
      updateMode: "Auto"
      ## @param aeterna.autoscaling.vpa.minAllowed Minimum allowed resources
      minAllowed:
        cpu: "50m"
        memory: "128Mi"
      ## @param aeterna.autoscaling.vpa.maxAllowed Maximum allowed resources
      maxAllowed:
        cpu: "4000m"
        memory: "8Gi"

  ## Pod disruption budget
  pdb:
    ## @param aeterna.pdb.enabled Enable PDB
    enabled: true
    ## @param aeterna.pdb.minAvailable Minimum available pods
    minAvailable: 1

  ## @param aeterna.nodeSelector Node selector
  nodeSelector: {}

  ## @param aeterna.tolerations Tolerations
  tolerations: []

  ## @param aeterna.affinity Affinity rules
  affinity: {}

  ## @param aeterna.topologySpreadConstraints Topology spread constraints
  topologySpreadConstraints: []

  ## Metrics configuration
  metrics:
    ## @param aeterna.metrics.enabled Enable Prometheus metrics endpoint
    enabled: true
    ## @param aeterna.metrics.port Metrics port
    port: 9090
    ## @param aeterna.metrics.path Metrics endpoint path
    path: /metrics
    ## @param aeterna.metrics.scrapeInterval Prometheus scrape interval
    scrapeInterval: "30s"
    ## @param aeterna.metrics.scrapeTimeout Prometheus scrape timeout
    scrapeTimeout: "10s"

  ## OpenTelemetry tracing configuration
  otel:
    ## @param aeterna.otel.enabled Enable OpenTelemetry tracing
    enabled: false
    ## @param aeterna.otel.endpoint OTLP exporter endpoint (e.g. http://jaeger-collector:4317)
    endpoint: ""
    ## @param aeterna.otel.samplingRate Trace sampling rate (0.0–1.0)
    samplingRate: "0.1"

  ## Logging configuration
  logging:
    ## @param aeterna.logging.format Log output format: json or text
    format: json
    ## @param aeterna.logging.level Log level: debug, info, warn, error
    level: info

  ## Feature flags
  features:
    ## @param aeterna.features.cca Enable CCA capabilities
    cca: true
    ## @param aeterna.features.radkit Enable Radkit A2A integration
    radkit: false
    ## @param aeterna.features.rlm Enable RLM graph memory
    rlm: true
    ## @param aeterna.features.reflective Enable reflective reasoning
    reflective: true

## GitHub Organization Sync configuration
## Syncs GitHub Org teams and members into Aeterna's organizational hierarchy
## Uses the GitHub App configured in knowledgeRepo.github for authentication
githubOrgSync:
  ## @param githubOrgSync.enabled Enable GitHub Organization sync
  enabled: false
  ## @param githubOrgSync.perTenantMode When true, credentials are read from per-tenant config. When false (default), reads from env vars.
  perTenantMode: false
  ## @param githubOrgSync.orgName GitHub Organization name to sync (e.g. "acme-corp")
  orgName: ""
  ## @param githubOrgSync.teamFilter Optional regex to filter teams (e.g. "^platform-")
  teamFilter: ""
  ## @param githubOrgSync.syncReposAsProjects Map team repositories as projects in the hierarchy
  syncReposAsProjects: false
  ## @param githubOrgSync.tenantId Tenant identifier for synced entities (name or UUID)
  tenantId: "default"
  ## CronJob configuration for periodic full resync
  cronJob:
    ## @param githubOrgSync.cronJob.enabled Enable CronJob for periodic GitHub org sync
    enabled: false
    ## @param githubOrgSync.cronJob.schedule Cron schedule expression (default: every 15 minutes)
    schedule: "*/15 * * * *"
    ## @param githubOrgSync.cronJob.successfulJobsHistoryLimit Number of successful jobs to retain
    successfulJobsHistoryLimit: 3
    ## @param githubOrgSync.cronJob.failedJobsHistoryLimit Number of failed jobs to retain
    failedJobsHistoryLimit: 3
    ## @param githubOrgSync.cronJob.backoffLimit Number of retries before marking job as failed
    backoffLimit: 1
    ## @param githubOrgSync.cronJob.activeDeadlineSeconds Maximum runtime per job execution (seconds)
    activeDeadlineSeconds: 300
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

# Kubernetes Service Account authentication for machine identities (e.g. CronJobs).
# When enabled, the server validates K8s SA bearer tokens via the TokenReview API.
k8sAuth:
  enabled: false
  # Audience used in projected token and TokenReview request.
  tokenReviewAudience: "aeterna"
  # Name of the dedicated ServiceAccount for the sync CronJob.
  syncServiceAccountName: "aeterna-sync"
  # Subject of the SA to bootstrap as PlatformAdmin (set via AETERNA_ADMIN_BOOTSTRAP_K8S_SA_SUBJECT env or here).
  # Format: "system:serviceaccount:<namespace>:<name>"
  syncSaSubject: ""

tenantConfigProvider:
  enabled: true
  seedTenants: []

## Plugin auth configuration
## Configures the OpenCode plugin authentication boundary (GitHub OAuth)
pluginAuth:
  ## @param pluginAuth.enabled Enable plugin authentication boundary
  enabled: false

## @param defaultTenantId Default tenant ID for tenant resolution (maps to AETERNA_DEFAULT_TENANT_ID).
## Used by plugin auth, webhooks, and any other flow that requires a fallback tenant.
## Leave empty to require explicit per-user tenant mapping (fail-closed).
defaultTenantId: ""

## Admin UI configuration
## Browser-based admin dashboard served at /admin/* by the Aeterna server
adminUi:
  ## @param adminUi.enabled Enable the admin dashboard (built into the container image by default)
  enabled: true
  ## @param adminUi.path Path to the admin UI static assets inside the container
  path: "/app/admin-ui/dist"

## Admin bootstrap configuration
## Seeds an initial PlatformAdmin user on first startup so the system is operational without manual DB intervention
adminBootstrap:
  ## @param adminBootstrap.email Email of the initial PlatformAdmin user (empty = skip bootstrap)
  email: ""
  ## @param adminBootstrap.provider Identity provider name for the admin user
  provider: "github"
  ## @param adminBootstrap.providerSubject Provider-specific subject identifier (e.g. GitHub login)
  providerSubject: ""

## Shared Git provider connections (platform-owned GitHub App connectivity)
## Each entry renders a Kubernetes Secret holding the PEM reference and
## seeds the platform connection registry via an init Job.
## Secret material (PEM keys) MUST be stored in separate Kubernetes Secrets
## referenced by pemSecretRef — never inlined here.
##
## Example:
##   gitProviderConnections:
##     - id: "acme-github-app"
##       name: "Acme GitHub App"
##       providerKind: GitHubApp
##       appId: "123456"
##       installationId: "9876543"
##       pemSecretRef: "secret/aeterna-github-app-pem/pem-key"
##       webhookSecretRef: "secret/aeterna-github-app-webhook/webhook-secret"
##       allowedTenantIds: []
gitProviderConnections: []


## Shared knowledge repository configuration
## Enables multi-replica consistency via a remote Git repository (GitHub)
## and PR-based governance for knowledge mutations at higher layers.
knowledgeRepo:
  ## @param knowledgeRepo.enabled Enable shared knowledge repository
  enabled: false
  ## @param knowledgeRepo.remoteUrl HTTPS URL for the shared knowledge Git repo (e.g. https://github.com/org/repo.git)
  remoteUrl: ""
  ## @param knowledgeRepo.branch Default branch for the knowledge repo
  branch: "main"
  ## GitHub API configuration (for PR-based governance and HTTPS git auth)
  github:
    ## @param knowledgeRepo.github.owner GitHub repository owner
    owner: ""
    ## @param knowledgeRepo.github.repo GitHub repository name
    repo: ""
    ## @param knowledgeRepo.github.tokenSecret Existing secret containing GitHub token (key: token)
    tokenSecret: ""
    ## @param knowledgeRepo.github.appId GitHub App ID
    appId: ""
    ## @param knowledgeRepo.github.installationId GitHub App Installation ID
    installationId: ""
    ## @param knowledgeRepo.github.pemSecret Existing secret containing GitHub App PEM key (key: pem-key)
    pemSecret: ""
  ## Webhook configuration (GitHub webhook for PR merge sync)
  webhook:
    ## @param knowledgeRepo.webhook.secretName Existing secret containing webhook secret (key: webhook-secret)
    secretName: ""

## Database migration configuration
migration:
  ## @param migration.ttlSecondsAfterFinished TTL for completed migration jobs (seconds)
  ttlSecondsAfterFinished: 300

## OPAL authorization stack
opal:
  ## @param opal.enabled Enable OPAL stack (Server + Cedar Agent)
  enabled: true

  ## OPAL Server configuration
  server:
    ## @param opal.server.replicaCount Number of OPAL Server replicas (>=2 for HA)
    replicaCount: 3
    httpPort: 7002
    broadcastPort: 7003
    ## @param opal.server.logLevel Log level for OPAL Server: DEBUG, INFO, WARNING, ERROR
    logLevel: INFO
    image:
      repository: permitio/opal-server
      tag: "0.8.0"
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 50m
        memory: 128Mi
    ## @param opal.server.redis Redis backend for multi-replica broadcast coordination
    redis:
      ## @param opal.server.redis.enabled Enable Redis PubSub backend (required when replicaCount > 1)
      enabled: true
      ## @param opal.server.redis.pubsubUri Redis URI for OPAL broadcast channel
      pubsubUri: "redis://aeterna-redis:6379/0"
      ## @param opal.server.redis.existingSecret Existing secret containing Redis URI (key: pubsub-uri)
      existingSecret: ""
    ## @param opal.server.policyRepoUrl Git repository URL for Cedar policies (set via private values for auth repos)
    policyRepoUrl: ""
    ## Policy repository SSH key configuration
    policyRepo:
      sshKey:
        ## @param opal.server.policyRepo.sshKey.existingSecret Existing secret containing SSH deploy key (key: ssh-key)
        existingSecret: ""

  ## Cedar Agent configuration (uses opal-client-cedar: OPAL client with embedded Cedar engine)
  cedarAgent:
    ## @param opal.cedarAgent.enabled Enable Cedar Agent
    enabled: true
    httpPort: 7000
    oidcPort: 8180
    ## @param opal.cedarAgent.replicaCount Number of Cedar Agent replicas (runs as Deployment, namespace-scoped)
    replicaCount: 1
    image:
      repository: permitio/opal-client-cedar
      tag: "0.9.3"
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 20m
        memory: 64Mi

  ## OPAL Fetcher configuration
  fetcher:
    ## @param opal.fetcher.enabled Enable OPAL Fetcher
    enabled: true
    httpPort: 7000
    image:
      repository: permitio/opal-client
      tag: "0.8.0"
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 20m
        memory: 64Mi

  ## Cedar policy text injected at chart-build time by CI.
  ## The helm-release workflow concatenates policies/cedar/*.cedar and
  ## policies/cedar/*.cedarschema into these values before packaging.
  ## Override manually only if you need custom policies.
  cedar:
    ## @param opal.cedar.policyText Concatenated Cedar policy text (auto-generated by CI)
    policyText: ""
    ## @param opal.cedar.schemaText Cedar schema text (auto-generated by CI)
    schemaText: ""

## Okta-backed interactive authentication boundary
okta:
  ## @param okta.enabled Enable Okta-backed oauth2-proxy auth boundary for interactive access
  enabled: false
  ## @param okta.provider OAuth provider name for oauth2-proxy
  provider: oidc
  ## @param okta.issuerUrl Okta issuer URL
  issuerUrl: ""
  ## @param okta.clientId Okta OIDC client ID
  clientId: ""
  ## @param okta.clientSecret Okta OIDC client secret
  clientSecret: ""
  ## @param okta.existingSecret Existing secret containing oauth2-proxy credentials
  existingSecret: ""
  ## @param okta.clientSecretKey Secret key containing the Okta client secret
  clientSecretKey: client-secret
  ## @param okta.cookieSecretKey Secret key containing the oauth2-proxy cookie secret
  cookieSecretKey: cookie-secret
  ## @param okta.cookieSecret Raw oauth2-proxy cookie secret (generated if omitted and no existingSecret is provided)
  cookieSecret: ""
  ## @param okta.redirectUrl Public redirect URL for the auth callback
  redirectUrl: ""
  ## @param okta.emailDomains Allowed email domains for login
  emailDomains:
    - "*"
  ## @param okta.allowedGroups Optional allowed Okta groups enforced by oauth2-proxy
  allowedGroups: []
  ## @param okta.scope Requested OIDC scopes
  scope: "openid profile email groups"
  ## @param okta.cookieSecure Require secure cookies
  cookieSecure: true
  ## @param okta.cookieDomains Cookie domain list
  cookieDomains: []
  ## @param okta.whitelistDomains Optional redirect whitelist domains
  whitelistDomains: []
  ## @param okta.authResponseHeaders Identity headers forwarded from oauth2-proxy to Aeterna ingress
  authResponseHeaders:
    - X-Auth-Request-User
    - X-Auth-Request-Email
    - X-Auth-Request-Groups
    - X-Auth-Request-Preferred-Username
    - X-Forwarded-User
    - X-Forwarded-Email
    - Authorization
  ## @param okta.proxyPrefix oauth2-proxy route prefix
  proxyPrefix: /oauth2
  image:
    ## @param okta.image.repository oauth2-proxy image repository
    repository: quay.io/oauth2-proxy/oauth2-proxy
    ## @param okta.image.tag oauth2-proxy image tag
    tag: "v7.8.1"
    ## @param okta.image.pullPolicy oauth2-proxy image pull policy
    pullPolicy: IfNotPresent
  service:
    ## @param okta.service.port oauth2-proxy service port
    port: 4180
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi
  extraArgs: []

## LLM provider configuration
llm:
  ## @param llm.provider LLM provider: openai, anthropic, ollama, google, bedrock, none
  provider: none

  ## OpenAI configuration
  openai:
    ## @param llm.openai.apiKey OpenAI API key
    apiKey: ""
    ## @param llm.openai.existingSecret Secret containing OpenAI API key
    existingSecret: ""
    ## @param llm.openai.model Model name
    model: "gpt-4o"
    ## @param llm.openai.embeddingModel Embedding model name
    embeddingModel: "text-embedding-3-small"

  ## Anthropic configuration
  anthropic:
    ## @param llm.anthropic.apiKey Anthropic API key
    apiKey: ""
    ## @param llm.anthropic.existingSecret Secret containing Anthropic API key
    existingSecret: ""
    ## @param llm.anthropic.model Model name
    model: "claude-sonnet-4-20250514"

  ## Ollama configuration
  ollama:
    ## @param llm.ollama.host Ollama host URL
    host: "http://localhost:11434"
    ## @param llm.ollama.model Model name
    model: "llama3.2"
    ## @param llm.ollama.embeddingModel Embedding model name
    embeddingModel: "nomic-embed-text"

  ## Google Cloud Vertex AI / Gemini configuration
  google:
    ## @param llm.google.projectId Google Cloud project ID
    projectId: ""
    ## @param llm.google.location Vertex AI location
    location: "us-central1"
    ## @param llm.google.model Google generation model
    model: "gemini-2.5-flash"
    ## @param llm.google.embeddingModel Google embedding model
    embeddingModel: "text-embedding-005"
    ## @param llm.google.existingSecret Existing secret containing ADC credential file
    existingSecret: ""
    ## @param llm.google.secretKey Secret key containing the credential file payload
    secretKey: "credentials.json"
    ## @param llm.google.wifTokenAudience Audience for projected Kubernetes service account token used by external WIF ADC
    wifTokenAudience: ""
    ## @param llm.google.wifTokenFile Path for projected Kubernetes service account token used by external WIF ADC
    wifTokenFile: "/var/run/secrets/tokens/gcp-token"

  ## AWS Bedrock configuration
  bedrock:
    ## @param llm.bedrock.region AWS region
    region: "us-east-1"
    ## @param llm.bedrock.model Bedrock generation model ID
    model: "amazon.nova-micro-v1:0"
    ## @param llm.bedrock.embeddingModel Bedrock embedding model ID
    embeddingModel: "amazon.titan-embed-text-v2:0"

## Observability configuration
observability:
  ## ServiceMonitor configuration
  serviceMonitor:
    ## @param observability.serviceMonitor.enabled Enable ServiceMonitor for Prometheus Operator
    enabled: false
    ## @param observability.serviceMonitor.interval Scrape interval
    interval: 30s
    ## @param observability.serviceMonitor.scrapeTimeout Scrape timeout
    scrapeTimeout: 10s
    ## @param observability.serviceMonitor.labels Additional labels
    labels: {}
    ## @param observability.serviceMonitor.metricRelabelings Metric relabeling rules
    metricRelabelings: []
    ## @param observability.serviceMonitor.relabelings Relabeling rules
    relabelings: []

  ## Tracing configuration
  tracing:
    ## @param observability.tracing.enabled Enable OpenTelemetry tracing
    enabled: false
    ## @param observability.tracing.endpoint OTLP endpoint
    endpoint: ""
    ## @param observability.tracing.samplingRatio Sampling ratio (0.0-1.0)
    samplingRatio: 0.1

  ## Logging configuration
  logging:
    ## @param observability.logging.level Log level: debug, info, warn, error
    level: info
    ## @param observability.logging.format Log format: json, pretty
    format: json

## Network policies
networkPolicy:
  ## @param networkPolicy.enabled Enable network policies
  enabled: false

## Code Search integration configuration
codesearch:
  ## @param codesearch.enabled Enable Code Search sidecar for semantic code search
  enabled: false
  
  ## @param codesearch.mcpServerUrl MCP server URL (defaults to localhost:9091 for sidecar)
  mcpServerUrl: "http://localhost:9091"
  
  ## Code Search container configuration
  image:
    ## @param codesearch.image.repository Code Search image repository
    repository: ghcr.io/kikokikok/codesearch
    ## @param codesearch.image.tag Code Search image tag
    tag: "latest"
    ## @param codesearch.image.pullPolicy Image pull policy
    pullPolicy: IfNotPresent
  
  ## Resource limits for Code Search sidecar
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi
  
  ## Embedder configuration
  embedder:
    ## @param codesearch.embedder.type Embedder type: ollama, openai
    type: ollama
    ## @param codesearch.embedder.model Model name
    model: "nomic-embed-text"
    ## @param codesearch.embedder.endpoint Custom endpoint URL (optional)
    endpoint: ""
  
  ## Storage backend configuration
  store:
    ## @param codesearch.store.type Storage type: qdrant, postgres, gob
    type: qdrant
    
    ## Qdrant store configuration
    qdrant:
      ## @param codesearch.store.qdrant.collectionPrefix Collection name prefix (defaults to codesearch_)
      collectionPrefix: "codesearch_"
    
    ## PostgreSQL store configuration  
    postgres:
      ## @param codesearch.store.postgres.schema PostgreSQL schema name (defaults to codesearch)
      schema: "codesearch"
  
  ## Projects to initialize
  projects:
    ## @param codesearch.projects List of projects to initialize on startup
    ## Example:
    ## - path: /workspace/project1
    ##   name: project1
    ## - path: /workspace/project2
    ##   name: project2
    []
  
  ## Init container configuration
  initContainer:
    ## @param codesearch.initContainer.enabled Enable init container to initialize projects
    enabled: true
    ## @param codesearch.initContainer.timeout Timeout for initialization (seconds)
    timeout: 300

## Global settings
global:
  ## @param global.imageRegistry Global image registry
  imageRegistry: ""
  ## @param global.imagePullSecrets Global image pull secrets
  imagePullSecrets: []
  ## @param global.storageClass Global storage class
  storageClass: ""

## Secrets management configuration
secrets:
  ## @param secrets.provider Secrets provider: helm (default), sops, external-secrets
  provider: helm

  ## External Secrets Operator configuration
  externalSecrets:
    ## @param secrets.externalSecrets.enabled Enable ExternalSecret resources
    enabled: false
    ## @param secrets.externalSecrets.refreshInterval Secret refresh interval
    refreshInterval: "1h"
    ## @param secrets.externalSecrets.secretStoreRef.name SecretStore or ClusterSecretStore name
    ## @param secrets.externalSecrets.secretStoreRef.kind SecretStore kind: SecretStore or ClusterSecretStore
    secretStoreRef:
      name: ""
      kind: ClusterSecretStore
    ## @param secrets.externalSecrets.remoteRefs Key mappings from external provider
    remoteRefs:
      postgresqlPassword: ""
      redisPassword: ""
      opalMasterToken: ""
      llmApiKey: ""

## Sync configuration (hybrid mode)
## In hybrid mode, Aeterna syncs memory layers between the local cache and central server.
## Memory tiers: Working (ephemeral) → Session (conversation) → Episodic (long-term).
## Working and Session sync by default; Episodic sync is opt-in as it involves larger data volumes.
sync:
  ## @param sync.enabled Enable sync service (auto-enabled in hybrid mode)
  enabled: false
  ## @param sync.interval Sync interval for memory layer synchronization
  interval: "30s"
  ## @param sync.batchSize Number of memories to sync per batch
  batchSize: 100
  ## @param sync.retryAttempts Number of retry attempts on sync failure
  retryAttempts: 3
  ## @param sync.retryDelay Delay between retry attempts
  retryDelay: "5s"
  ## Memory layer sync configuration
  ## Working memory: short-lived, per-request context — synced frequently
  ## Session memory: per-conversation context — synced at conversation boundaries
  ## Episodic memory: long-term learnings — synced less frequently, larger payloads
  memoryLayers:
    ## @param sync.memoryLayers.working Enable working memory sync
    working: true
    ## @param sync.memoryLayers.session Enable session memory sync
    session: true
    ## @param sync.memoryLayers.episodic Enable episodic memory sync (large payloads, set false for bandwidth-constrained)
    episodic: false

## Backup configuration
backup:
  ## @param backup.enabled Enable automated backups
  enabled: false
  ## @param backup.schedule Cron schedule for backups
  schedule: "0 2 * * *"
  ## @param backup.retentionDays Number of days to retain backups
  retentionDays: 30
  ## @param backup.destination.type Backup destination: s3, gcs, azure
  destination:
    type: s3
    s3:
      bucket: ""
      region: "us-east-1"
      endpoint: ""
      existingSecret: ""
      secretKey: "aws-secret-access-key"
      accessKeyId: ""
    gcs:
      bucket: ""
      serviceAccountSecret: ""
    azure:
      container: ""
      storageAccountSecret: ""
  ## @param backup.verify.enabled Enable backup verification job
  verify:
    enabled: false
    schedule: "0 6 * * *"

