apiVersion: v2
name: aeterna
description: >-
  Aeterna application chart — deploys the Aeterna server, OPAL authorization
  stack, and supporting jobs. Requires external PostgreSQL, Redis-compatible
  cache, and vector store. Use the aeterna-prereqs chart for dev/test backends.
type: application
version: 0.8.0-rc.5
appVersion: "0.8.0-rc.5"

home: https://github.com/kikokikok/aeterna
icon: https://raw.githubusercontent.com/kikokikok/aeterna/main/docs/logo.png
sources:
  - https://github.com/kikokikok/aeterna

maintainers:
  - name: kikokikok
    url: https://github.com/kikokikok

keywords:
  - ai
  - agents
  - memory
  - knowledge
  - vector-database
  - enterprise
  - mcp

annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: ai-machine-learning

## No dependencies — this chart deploys only the Aeterna application.
## Stateful services (PostgreSQL, Redis, Qdrant) are provided externally.
## For dev/test, deploy them with: helm install prereqs charts/aeterna-prereqs
