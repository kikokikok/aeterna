deploymentMode: local

aeterna:
  enabled: true
  replicaCount: 1
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: aeterna.okta.local
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: aeterna-okta-tls
        hosts:
          - aeterna.okta.local

okta:
  enabled: true
  issuerUrl: https://example.okta.com/oauth2/default
  clientId: aeterna-okta-ci
  clientSecret: super-secret-client
  cookieSecret: 0123456789abcdef0123456789abcdef
  redirectUrl: https://aeterna.okta.local/oauth2/callback
  cookieDomains:
    - .okta.local
  whitelistDomains:
    - .okta.local
  allowedGroups:
    - aeterna-users

opal:
  enabled: true
