deploymentMode: local

aeterna:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/kikokikok/aeterna
    tag: latest
    pullPolicy: IfNotPresent

vectorBackend:
  type: qdrant
  qdrant:
    bundled: false
    external:
      host: qdrant.ci.example.com
      port: 6333

cache:
  type: external
  dragonfly:
    enabled: false
  external:
    enabled: true
    host: redis.ci.example.com
    port: 6379
    secretKey: redis-password

postgresql:
  bundled: false
  external:
    host: postgres.ci.example.com
    port: 5432
    database: aeterna
    username: aeterna
    secretKey: postgres-password
    sslMode: require

opal:
  enabled: true

llm:
  provider: none

observability:
  serviceMonitor:
    enabled: false

networkPolicy:
  enabled: false

dragonfly:
  enabled: false

qdrant:
  enabled: false

weaviate:
  enabled: false

mongodb:
  enabled: false
