{{- include "aeterna.validate.all" . -}}
{{- if .Values.aeterna.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aeterna.fullname" . }}
  labels:
    {{- include "aeterna.labels" . | nindent 4 }}
data:
  AETERNA_DEPLOYMENT_MODE: {{ .Values.deploymentMode | quote }}
  AETERNA_LOG_LEVEL: {{ .Values.observability.logging.level | quote }}
  AETERNA_LOG_FORMAT: {{ .Values.observability.logging.format | quote }}
  AETERNA_FEATURE_CCA: {{ .Values.aeterna.features.cca | quote }}
  AETERNA_FEATURE_RADKIT: {{ .Values.aeterna.features.radkit | quote }}
  AETERNA_FEATURE_RLM: {{ .Values.aeterna.features.rlm | quote }}
  AETERNA_FEATURE_REFLECTIVE: {{ .Values.aeterna.features.reflective | quote }}
  AETERNA_VECTOR_BACKEND: {{ .Values.vectorStore.type | quote }}
  AETERNA_POSTGRESQL_HOST: {{ include "aeterna.postgresql.host" . | quote }}
  AETERNA_POSTGRESQL_PORT: {{ include "aeterna.postgresql.port" . | quote }}
  AETERNA_POSTGRESQL_DATABASE: {{ include "aeterna.postgresql.database" . | quote }}
  AETERNA_REDIS_HOST: {{ include "aeterna.redis.host" . | quote }}
  AETERNA_REDIS_PORT: {{ include "aeterna.redis.port" . | quote }}
  {{- if eq .Values.vectorStore.type "qdrant" }}
  AETERNA_QDRANT_HOST: {{ include "aeterna.vectorStore.host" . | quote }}
  AETERNA_QDRANT_PORT: {{ include "aeterna.vectorStore.port" . | quote }}
  {{- end }}
  {{- if eq .Values.vectorStore.type "pgvector" }}
  AETERNA_PGVECTOR_ENABLED: "true"
  {{- end }}
  {{- if eq .Values.vectorStore.type "pinecone" }}
  AETERNA_PINECONE_ENVIRONMENT: {{ .Values.vectorStore.pinecone.environment | quote }}
  AETERNA_PINECONE_INDEX_NAME: {{ .Values.vectorStore.pinecone.indexName | quote }}
  {{- end }}
  {{- if eq .Values.vectorStore.type "weaviate" }}
  AETERNA_WEAVIATE_HOST: {{ include "aeterna.vectorStore.host" . | quote }}
  {{- end }}
  {{- if eq .Values.vectorStore.type "vertexai" }}
  AETERNA_VERTEXAI_PROJECT: {{ .Values.vectorStore.vertexai.project | quote }}
  AETERNA_VERTEXAI_REGION: {{ .Values.vectorStore.vertexai.region | quote }}
  AETERNA_VERTEXAI_ENDPOINT: {{ .Values.vectorStore.vertexai.endpoint | quote }}
  {{- end }}
  {{- if eq .Values.vectorStore.type "databricks" }}
  AETERNA_DATABRICKS_WORKSPACE_URL: {{ .Values.vectorStore.databricks.workspaceUrl | quote }}
  AETERNA_DATABRICKS_CATALOG: {{ .Values.vectorStore.databricks.catalog | quote }}
  {{- end }}
  {{- if .Values.opal.enabled }}
  AETERNA_OPAL_ENABLED: "true"
  AETERNA_AUTH_BACKEND: "cedar"
  AETERNA_CEDAR_AGENT_HOST: {{ printf "%s-cedar-agent" (include "aeterna.fullname" .) | quote }}
  AETERNA_CEDAR_AGENT_PORT: "8180"
  {{- if .Values.opal.cedar.policyText }}
  AETERNA_CEDAR_POLICY_TEXT: {{ .Values.opal.cedar.policyText | quote }}
  {{- end }}
  {{- if .Values.opal.cedar.schemaText }}
  AETERNA_CEDAR_SCHEMA_TEXT: {{ .Values.opal.cedar.schemaText | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.pluginAuth.enabled }}
  AETERNA_PLUGIN_AUTH_ENABLED: "true"
  {{- if .Values.pluginAuth.github.clientId }}
  AETERNA_PLUGIN_AUTH_GITHUB_CLIENT_ID: {{ .Values.pluginAuth.github.clientId | quote }}
  {{- end }}
  {{- if .Values.pluginAuth.github.appId }}
  AETERNA_PLUGIN_AUTH_GITHUB_APP_ID: {{ .Values.pluginAuth.github.appId | quote }}
  {{- end }}
  {{- if .Values.pluginAuth.github.appName }}
  AETERNA_PLUGIN_AUTH_GITHUB_APP_NAME: {{ .Values.pluginAuth.github.appName | quote }}
  {{- end }}
  {{- if .Values.pluginAuth.redirectBaseUrl }}
  AETERNA_PLUGIN_AUTH_REDIRECT_BASE_URL: {{ .Values.pluginAuth.redirectBaseUrl | quote }}
  {{- end }}
  {{- if .Values.pluginAuth.tokenIssuer }}
  AETERNA_PLUGIN_AUTH_TOKEN_ISSUER: {{ .Values.pluginAuth.tokenIssuer | quote }}
  {{- end }}
  AETERNA_PLUGIN_AUTH_ACCESS_TOKEN_TTL_SECONDS: {{ .Values.pluginAuth.accessTokenTtlSeconds | quote }}
  AETERNA_PLUGIN_AUTH_REFRESH_TOKEN_TTL_SECONDS: {{ .Values.pluginAuth.refreshTokenTtlSeconds | quote }}
  {{- end }}
  {{- if .Values.defaultTenantId }}
  AETERNA_DEFAULT_TENANT_ID: {{ .Values.defaultTenantId | quote }}
  {{- end }}
  {{- if .Values.k8sAuth.enabled }}
  AETERNA_K8S_AUTH_ENABLED: "true"
  AETERNA_K8S_AUTH_TOKEN_REVIEW_AUDIENCE: {{ .Values.k8sAuth.tokenReviewAudience | default "aeterna" | quote }}
  {{- end }}
  {{- if and (ne .Values.deploymentMode "local") .Values.central.url }}
  AETERNA_CENTRAL_URL: {{ .Values.central.url | quote }}
  AETERNA_CENTRAL_AUTH: {{ .Values.central.auth | quote }}
  {{- end }}
  {{- if ne .Values.llm.provider "none" }}
  AETERNA_LLM_PROVIDER: {{ .Values.llm.provider | quote }}
  {{- if eq .Values.llm.provider "openai" }}
  AETERNA_OPENAI_MODEL: {{ .Values.llm.openai.model | quote }}
  AETERNA_OPENAI_EMBEDDING_MODEL: {{ .Values.llm.openai.embeddingModel | quote }}
  {{- end }}
  {{- if eq .Values.llm.provider "anthropic" }}
  AETERNA_ANTHROPIC_MODEL: {{ .Values.llm.anthropic.model | quote }}
  {{- end }}
  {{- if eq .Values.llm.provider "ollama" }}
  AETERNA_OLLAMA_HOST: {{ .Values.llm.ollama.host | quote }}
  AETERNA_OLLAMA_MODEL: {{ .Values.llm.ollama.model | quote }}
  AETERNA_OLLAMA_EMBEDDING_MODEL: {{ .Values.llm.ollama.embeddingModel | quote }}
  {{- end }}
  {{- if eq .Values.llm.provider "google" }}
  AETERNA_GOOGLE_PROJECT_ID: {{ .Values.llm.google.projectId | quote }}
  AETERNA_GOOGLE_LOCATION: {{ .Values.llm.google.location | quote }}
  AETERNA_GOOGLE_MODEL: {{ .Values.llm.google.model | quote }}
  AETERNA_GOOGLE_EMBEDDING_MODEL: {{ .Values.llm.google.embeddingModel | quote }}
  {{- end }}
  {{- if eq .Values.llm.provider "bedrock" }}
  AETERNA_BEDROCK_REGION: {{ .Values.llm.bedrock.region | quote }}
  AETERNA_BEDROCK_MODEL: {{ .Values.llm.bedrock.model | quote }}
  AETERNA_BEDROCK_EMBEDDING_MODEL: {{ .Values.llm.bedrock.embeddingModel | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.observability.tracing.enabled }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.observability.tracing.endpoint | quote }}
  OTEL_TRACES_SAMPLER_ARG: {{ .Values.observability.tracing.samplingRatio | quote }}
  {{- end }}
{{- end }}
