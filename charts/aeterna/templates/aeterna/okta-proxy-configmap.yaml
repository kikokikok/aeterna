{{- if and .Values.aeterna.enabled .Values.okta.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aeterna.fullname" . }}-okta-proxy
  labels:
    {{- include "aeterna.labels" . | nindent 4 }}
data:
  OAUTH2_PROXY_PROVIDER: {{ .Values.okta.provider | quote }}
  OAUTH2_PROXY_OIDC_ISSUER_URL: {{ .Values.okta.issuerUrl | quote }}
  OAUTH2_PROXY_CLIENT_ID: {{ .Values.okta.clientId | quote }}
  OAUTH2_PROXY_REDIRECT_URL: {{ .Values.okta.redirectUrl | quote }}
  OAUTH2_PROXY_EMAIL_DOMAINS: {{ join "," .Values.okta.emailDomains | quote }}
  OAUTH2_PROXY_SCOPE: {{ .Values.okta.scope | quote }}
  OAUTH2_PROXY_HTTP_ADDRESS: {{ printf "0.0.0.0:%v" .Values.okta.service.port | quote }}
  OAUTH2_PROXY_PROXY_PREFIX: {{ .Values.okta.proxyPrefix | quote }}
  OAUTH2_PROXY_REVERSE_PROXY: "true"
  OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
  OAUTH2_PROXY_SET_AUTHORIZATION_HEADER: "true"
  OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
  OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "true"
  OAUTH2_PROXY_COOKIE_SECURE: {{ .Values.okta.cookieSecure | quote }}
  OAUTH2_PROXY_COOKIE_CSRF_PER_REQUEST: "true"
  OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
  OAUTH2_PROXY_SILENCE_PING_LOGGING: "true"
  OAUTH2_PROXY_UPSTREAMS: "static://202"
  {{- if .Values.okta.allowedGroups }}
  OAUTH2_PROXY_ALLOWED_GROUPS: {{ join "," .Values.okta.allowedGroups | quote }}
  {{- end }}
  {{- if .Values.okta.cookieDomains }}
  OAUTH2_PROXY_COOKIE_DOMAINS: {{ join "," .Values.okta.cookieDomains | quote }}
  {{- end }}
  {{- if .Values.okta.whitelistDomains }}
  OAUTH2_PROXY_WHITELIST_DOMAINS: {{ join "," .Values.okta.whitelistDomains | quote }}
  {{- end }}
{{- end }}
