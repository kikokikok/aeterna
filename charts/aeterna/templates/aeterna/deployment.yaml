{{- include "aeterna.validateConfig" . -}}
{{- if .Values.aeterna.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aeterna.fullname" . }}
  labels:
    {{- include "aeterna.labels" . | nindent 4 }}
spec:
  {{- if not .Values.aeterna.autoscaling.enabled }}
  replicas: {{ .Values.aeterna.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "aeterna.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "aeterna.checksumAnnotations" . | nindent 8 }}
        {{- with .Values.aeterna.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "aeterna.labels" . | nindent 8 }}
        {{- with .Values.aeterna.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "aeterna.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "aeterna.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.aeterna.podSecurityContext | nindent 8 }}
      {{- if and .Values.codesearch.enabled .Values.codesearch.initContainer.enabled }}
      initContainers:
        - name: codesearch-init
          image: {{ .Values.codesearch.image.repository }}:{{ .Values.codesearch.image.tag }}
          imagePullPolicy: {{ .Values.codesearch.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              /scripts/init-projects.sh
          envFrom:
            - configMapRef:
                name: {{ include "aeterna.fullname" . }}-codesearch
          {{- if eq .Values.codesearch.store.type "postgres" }}
          env:
            - name: CODESEARCH_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "aeterna.postgresql.secretName" . }}
                  key: {{ include "aeterna.postgresql.passwordKey" . }}
          {{- end }}
          {{- if and (eq .Values.codesearch.embedder.type "openai") }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llm.openai.existingSecret | default (printf "%s-openai" (include "aeterna.fullname" .)) }}
                  key: api-key
          {{- end }}
          volumeMounts:
            - name: codesearch-config
              mountPath: /scripts
            - name: codesearch-data
              mountPath: /data
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
      {{- end }}
      containers:
        - name: aeterna
          securityContext:
            {{- toYaml .Values.aeterna.securityContext | nindent 12 }}
          image: {{ include "aeterna.image" . | quote }}
          imagePullPolicy: {{ .Values.aeterna.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "aeterna.fullname" . }}
          env:
            ## PostgreSQL connection
            - name: PG_HOST
              value: {{ include "aeterna.postgresql.host" . | quote }}
            - name: PG_PORT
              value: {{ include "aeterna.postgresql.port" . | quote }}
            - name: PG_DATABASE
              value: {{ include "aeterna.postgresql.database" . | quote }}
            - name: PG_USERNAME
              value: {{ .Values.postgresql.username | default "aeterna" | quote }}
            - name: AETERNA_POSTGRESQL_USERNAME
              value: {{ .Values.postgresql.username | default "aeterna" | quote }}
            {{- if .Values.postgresql.existingSecret }}
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "aeterna.postgresql.secretName" . }}
                  key: {{ include "aeterna.postgresql.passwordKey" . }}
            - name: AETERNA_POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "aeterna.postgresql.secretName" . }}
                  key: {{ include "aeterna.postgresql.passwordKey" . }}
            {{- end }}
            ## Redis connection
            - name: RD_HOST
              value: {{ include "aeterna.redis.host" . | quote }}
            - name: RD_PORT
              value: {{ include "aeterna.redis.port" . | quote }}
            {{- if .Values.redis.existingSecret }}
            - name: AETERNA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "aeterna.redis.secretName" . }}
                  key: {{ include "aeterna.redis.passwordKey" . }}
            {{- end }}
            ## Vector store connection
            {{- if .Values.vectorStore.host }}
            - name: QD_HOST
              value: {{ include "aeterna.vectorStore.host" . | quote }}
            - name: QD_PORT
              value: {{ include "aeterna.vectorStore.port" . | quote }}
            {{- end }}
            {{- if .Values.vectorStore.existingSecret }}
            - name: AETERNA_VECTOR_STORE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vectorStore.existingSecret }}
                  key: {{ .Values.vectorStore.apiKeyKey | default "api-key" }}
                  optional: true
            {{- end }}
            {{- if and (ne .Values.deploymentMode "local") .Values.central.url }}
            - name: AETERNA_CENTRAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.central.existingSecret | default (printf "%s-central" (include "aeterna.fullname" .)) }}
                  key: {{ .Values.central.secretKey | default "api-key" }}
            {{- end }}
            {{- if and (eq .Values.llm.provider "openai") }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llm.openai.existingSecret | default (printf "%s-openai" (include "aeterna.fullname" .)) }}
                  key: api-key
            {{- end }}
            {{- if and (eq .Values.llm.provider "anthropic") }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llm.anthropic.existingSecret | default (printf "%s-anthropic" (include "aeterna.fullname" .)) }}
                  key: api-key
            {{- end }}
            {{- if and (eq .Values.llm.provider "google") .Values.llm.google.existingSecret }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/run/aeterna/google/{{ .Values.llm.google.secretKey }}
            {{- end }}
            {{- if and (eq .Values.llm.provider "google") .Values.llm.google.wifTokenAudience }}
            - name: GOOGLE_EXTERNAL_ACCOUNT_ALLOW_EXECUTABLES
              value: "0"
            {{- end }}
            {{- if and (eq .Values.vectorStore.type "pinecone") .Values.vectorStore.existingSecret }}
            - name: AETERNA_PINECONE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vectorStore.existingSecret }}
                  key: {{ .Values.vectorStore.apiKeyKey | default "api-key" }}
            {{- end }}
            {{- if and (eq .Values.vectorStore.type "qdrant") .Values.vectorStore.existingSecret }}
            - name: AETERNA_QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vectorStore.existingSecret }}
                  key: {{ .Values.vectorStore.apiKeyKey | default "api-key" }}
                  optional: true
            {{- end }}
            {{- if .Values.observability.tracing.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.tracing.endpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: "aeterna"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_traceidratio"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: {{ .Values.observability.tracing.samplingRatio | default "1.0" | quote }}
            {{- end }}
            {{- if .Values.pluginAuth.enabled }}
            - name: AETERNA_PLUGIN_AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pluginAuth.existingSecret | default (printf "%s-plugin-auth" (include "aeterna.fullname" .)) }}
                  key: jwt-secret
            - name: AETERNA_PLUGIN_AUTH_GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pluginAuth.existingSecret | default (printf "%s-plugin-auth" (include "aeterna.fullname" .)) }}
                  key: github-client-secret
            - name: AETERNA_PLUGIN_AUTH_GITHUB_APP_PEM
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pluginAuth.existingSecret | default (printf "%s-plugin-auth" (include "aeterna.fullname" .)) }}
                  key: github-app-pem
                  optional: true
            {{- end }}
            - name: RUST_LOG
              value: {{ .Values.observability.logging.level | default "info" | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.observability.logging.format | default "json" | quote }}
            - name: AETERNA_KNOWLEDGE_REPO_PATH
              value: /tmp/knowledge-repo
            - name: AETERNA_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.githubOrgSync.enabled }}
            - name: AETERNA_GITHUB_ORG_NAME
              value: {{ .Values.githubOrgSync.orgName | quote }}
            {{- if .Values.githubOrgSync.teamFilter }}
            - name: AETERNA_GITHUB_TEAM_FILTER
              value: {{ .Values.githubOrgSync.teamFilter | quote }}
            {{- end }}
            {{- if .Values.githubOrgSync.syncReposAsProjects }}
            - name: AETERNA_GITHUB_SYNC_REPOS_AS_PROJECTS
              value: "true"
            {{- end }}
            {{- if .Values.githubOrgSync.tenantId }}
            - name: AETERNA_TENANT_ID
              value: {{ .Values.githubOrgSync.tenantId | quote }}
            {{- end }}
            {{- if and (not .Values.knowledgeRepo.enabled) .Values.knowledgeRepo.github.appId }}
            - name: AETERNA_GITHUB_APP_ID
              value: {{ .Values.knowledgeRepo.github.appId | quote }}
            {{- end }}
            {{- if and (not .Values.knowledgeRepo.enabled) .Values.knowledgeRepo.github.installationId }}
            - name: AETERNA_GITHUB_INSTALLATION_ID
              value: {{ .Values.knowledgeRepo.github.installationId | quote }}
            {{- end }}
            {{- if and (not .Values.knowledgeRepo.enabled) .Values.knowledgeRepo.github.pemSecret }}
            - name: AETERNA_GITHUB_APP_PEM
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.knowledgeRepo.github.pemSecret }}
                  key: pem-key
            {{- end }}
            {{- end }}
            {{- if .Values.knowledgeRepo.enabled }}
            - name: AETERNA_KNOWLEDGE_REPO_URL
              value: {{ .Values.knowledgeRepo.remoteUrl | quote }}
            - name: AETERNA_KNOWLEDGE_REPO_BRANCH
              value: {{ .Values.knowledgeRepo.branch | default "main" | quote }}
            {{- if .Values.knowledgeRepo.github.owner }}
            - name: AETERNA_GITHUB_OWNER
              value: {{ .Values.knowledgeRepo.github.owner | quote }}
            {{- end }}
            {{- if .Values.knowledgeRepo.github.repo }}
            - name: AETERNA_GITHUB_REPO
              value: {{ .Values.knowledgeRepo.github.repo | quote }}
            {{- end }}
            {{- if .Values.knowledgeRepo.github.tokenSecret }}
            - name: AETERNA_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.knowledgeRepo.github.tokenSecret }}
                  key: token
            {{- end }}
            {{- if .Values.knowledgeRepo.github.appId }}
            - name: AETERNA_GITHUB_APP_ID
              value: {{ .Values.knowledgeRepo.github.appId | quote }}
            {{- end }}
            {{- if .Values.knowledgeRepo.github.installationId }}
            - name: AETERNA_GITHUB_INSTALLATION_ID
              value: {{ .Values.knowledgeRepo.github.installationId | quote }}
            {{- end }}
            {{- if .Values.knowledgeRepo.github.pemSecret }}
            - name: AETERNA_GITHUB_APP_PEM
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.knowledgeRepo.github.pemSecret }}
                  key: pem-key
            {{- end }}
            {{- if .Values.knowledgeRepo.webhook.secretName }}
            - name: AETERNA_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.knowledgeRepo.webhook.secretName }}
                  key: webhook-secret
            {{- end }}
            {{- end }}
            {{- if .Values.adminUi.enabled }}
            - name: AETERNA_ADMIN_UI_PATH
              value: {{ .Values.adminUi.path | default "/app/admin-ui/dist" | quote }}
            {{- end }}
            {{- if .Values.adminBootstrap.email }}
            - name: AETERNA_ADMIN_BOOTSTRAP_EMAIL
              value: {{ .Values.adminBootstrap.email | quote }}
            - name: AETERNA_ADMIN_BOOTSTRAP_PROVIDER
              value: {{ .Values.adminBootstrap.provider | default "github" | quote }}
            {{- if .Values.adminBootstrap.providerSubject }}
            - name: AETERNA_ADMIN_BOOTSTRAP_PROVIDER_SUBJECT
              value: {{ .Values.adminBootstrap.providerSubject | quote }}
            {{- end }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.aeterna.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.aeterna.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.aeterna.startupProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.aeterna.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /home/aeterna/.cache
            - name: app-config
              mountPath: /app/config
            {{- if and (eq .Values.llm.provider "google") .Values.llm.google.existingSecret }}
            - name: google-application-credentials
              mountPath: /var/run/aeterna/google
              readOnly: true
            {{- end }}
            {{- if and (eq .Values.llm.provider "google") .Values.llm.google.wifTokenAudience }}
            - name: google-external-account-token
              mountPath: {{ dir .Values.llm.google.wifTokenFile }}
              readOnly: true
            {{- end }}
        {{- if .Values.codesearch.enabled }}
        - name: codesearch
          image: {{ .Values.codesearch.image.repository }}:{{ .Values.codesearch.image.tag }}
          imagePullPolicy: {{ .Values.codesearch.image.pullPolicy }}
          command: ["codesearch"]
          args: ["mcp", "serve", "--host", "0.0.0.0", "--port", "9091"]
          ports:
            - name: mcp
              containerPort: 9091
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "aeterna.fullname" . }}-codesearch
          {{- if eq .Values.codesearch.store.type "postgres" }}
          env:
            - name: CODESEARCH_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "aeterna.postgresql.secretName" . }}
                  key: {{ include "aeterna.postgresql.passwordKey" . }}
          {{- end }}
          {{- if and (eq .Values.codesearch.embedder.type "openai") }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llm.openai.existingSecret | default (printf "%s-openai" (include "aeterna.fullname" .)) }}
                  key: api-key
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: mcp
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: mcp
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.codesearch.resources | nindent 12 }}
          volumeMounts:
            - name: codesearch-data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
        {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: app-config
          emptyDir: {}
        {{- if and (eq .Values.llm.provider "google") .Values.llm.google.existingSecret }}
        - name: google-application-credentials
          secret:
            secretName: {{ .Values.llm.google.existingSecret }}
        {{- end }}
        {{- if and (eq .Values.llm.provider "google") .Values.llm.google.wifTokenAudience }}
        - name: google-external-account-token
          projected:
            sources:
              - serviceAccountToken:
                  path: {{ base .Values.llm.google.wifTokenFile }}
                  expirationSeconds: 3600
                  audience: {{ .Values.llm.google.wifTokenAudience | quote }}
        {{- end }}
        {{- if .Values.codesearch.enabled }}
        - name: codesearch-config
          configMap:
            name: {{ include "aeterna.fullname" . }}-codesearch
            defaultMode: 0755
            items:
              - key: init-projects.sh
                path: init-projects.sh
        - name: codesearch-data
          emptyDir: {}
        {{- end }}
      {{- with .Values.aeterna.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.aeterna.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.aeterna.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.aeterna.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
