{{- if .Values.aeterna.enabled }}
{{- if not .Values.postgresql.external.existingSecret }}
{{- if not .Values.postgresql.bundled }}
{{- $postgresSecretName := printf "%s-postgresql" (include "aeterna.fullname" .) }}
{{- $postgresSecretKey := .Values.postgresql.external.secretKey | default "postgres-password" }}
{{- $existingPostgresSecret := lookup "v1" "Secret" .Release.Namespace $postgresSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $postgresSecretName }}
  labels:
    {{- include "aeterna.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.postgresql.external.password }}
  {{ $postgresSecretKey }}: {{ .Values.postgresql.external.password | b64enc | quote }}
  {{- else if and $existingPostgresSecret (hasKey $existingPostgresSecret.data $postgresSecretKey) }}
  {{ $postgresSecretKey }}: {{ index $existingPostgresSecret.data $postgresSecretKey | quote }}
  {{- else }}
  {{ $postgresSecretKey }}: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
---
{{- end }}
{{- end }}
{{- if and .Values.cache.external.enabled (not .Values.cache.external.existingSecret) }}
{{- $redisSecretName := printf "%s-redis" (include "aeterna.fullname" .) }}
{{- $redisSecretKey := .Values.cache.external.secretKey | default "redis-password" }}
{{- $existingRedisSecret := lookup "v1" "Secret" .Release.Namespace $redisSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $redisSecretName }}
  labels:
    {{- include "aeterna.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.cache.external.password }}
  {{ $redisSecretKey }}: {{ .Values.cache.external.password | b64enc | quote }}
  {{- else if and $existingRedisSecret (hasKey $existingRedisSecret.data $redisSecretKey) }}
  {{ $redisSecretKey }}: {{ index $existingRedisSecret.data $redisSecretKey | quote }}
  {{- else }}
  {{ $redisSecretKey }}: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
---
{{- end }}
{{- if and (ne .Values.deploymentMode "local") .Values.central.apiKey (not .Values.central.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aeterna.fullname" . }}-central
  labels:
    {{- include "aeterna.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.central.secretKey | default "api-key" }}: {{ .Values.central.apiKey | b64enc | quote }}
---
{{- end }}
{{- if and (eq .Values.llm.provider "openai") .Values.llm.openai.apiKey (not .Values.llm.openai.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aeterna.fullname" . }}-openai
  labels:
    {{- include "aeterna.labels" . | nindent 4 }}
type: Opaque
data:
  api-key: {{ .Values.llm.openai.apiKey | b64enc | quote }}
---
{{- end }}
{{- if and (eq .Values.llm.provider "anthropic") .Values.llm.anthropic.apiKey (not .Values.llm.anthropic.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aeterna.fullname" . }}-anthropic
  labels:
    {{- include "aeterna.labels" . | nindent 4 }}
type: Opaque
data:
  api-key: {{ .Values.llm.anthropic.apiKey | b64enc | quote }}
---
{{- end }}
{{- if and (eq .Values.vectorBackend.type "pinecone") .Values.vectorBackend.pinecone.apiKey (not .Values.vectorBackend.pinecone.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aeterna.fullname" . }}-pinecone
  labels:
    {{- include "aeterna.labels" . | nindent 4 }}
type: Opaque
data:
  api-key: {{ .Values.vectorBackend.pinecone.apiKey | b64enc | quote }}
---
{{- end }}
{{- if and (not .Values.vectorBackend.qdrant.bundled) .Values.vectorBackend.qdrant.external.apiKey (not .Values.vectorBackend.qdrant.external.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aeterna.fullname" . }}-qdrant
  labels:
    {{- include "aeterna.labels" . | nindent 4 }}
type: Opaque
data:
  api-key: {{ .Values.vectorBackend.qdrant.external.apiKey | b64enc | quote }}
---
{{- end }}
{{- if and .Values.okta.enabled (not .Values.okta.existingSecret) }}
{{- $oktaSecretName := include "aeterna.okta.secretName" . }}
{{- $existingOktaSecret := lookup "v1" "Secret" .Release.Namespace $oktaSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $oktaSecretName }}
  labels:
    {{- include "aeterna.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.okta.clientSecretKey }}: {{ .Values.okta.clientSecret | b64enc | quote }}
  {{- if .Values.okta.cookieSecret }}
  {{ .Values.okta.cookieSecretKey }}: {{ .Values.okta.cookieSecret | b64enc | quote }}
  {{- else if and $existingOktaSecret (hasKey $existingOktaSecret.data .Values.okta.cookieSecretKey) }}
  {{ .Values.okta.cookieSecretKey }}: {{ index $existingOktaSecret.data .Values.okta.cookieSecretKey | quote }}
  {{- else }}
  {{ .Values.okta.cookieSecretKey }}: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end }}
