{{- if .Values.opal.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aeterna.fullname" . }}-opal
  labels:
    {{- include "aeterna.opal.labels" . | nindent 4 }}
data:
  data-config-sources: |
    {
      "config": {
        "entries": [
          {{- if .Values.aeterna.enabled }}
          {
            "url": "http://{{ include "aeterna.fullname" . }}:{{ .Values.aeterna.service.port }}/policy-data",
            "topics": ["policy_data"],
            "dst_path": "/aeterna"
          }
          {{- end }}
        ]
      }
    }
  policy-repo-url: ""
  log-level: {{ .Values.observability.logging.level | default "info" | quote }}
{{- end }}
