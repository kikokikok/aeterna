{{- if .Values.opal.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aeterna.fullname" . }}-opal
  labels:
    {{- include "aeterna.opal.labels" . | nindent 4 }}
type: Opaque
data:
  {{- $secretName := printf "%s-opal" (include "aeterna.fullname" .) }}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
  {{- if $existing }}
  {{- /* Reuse existing tokens to prevent credential rotation on helm upgrade */}}
  master-token: {{ index $existing.data "master-token" | quote }}
  client-token: {{ index $existing.data "client-token" | quote }}
  {{- else }}
  {{- /* First install: generate tokens. Store them in existingSecret for production. */}}
  master-token: {{ randAlphaNum 32 | b64enc | quote }}
  client-token: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
