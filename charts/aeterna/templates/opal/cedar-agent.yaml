{{- if and .Values.opal.enabled .Values.opal.cedarAgent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aeterna.fullname" . }}-cedar-agent
  labels:
    {{- include "aeterna.opal.labels" . | nindent 4 }}
    {{- include "aeterna.opal.cedarAgent.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.opal.cedarAgent.replicaCount }}
  selector:
    matchLabels:
      {{- include "aeterna.opal.cedarAgent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/opal/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/opal/secret.yaml") . | sha256sum }}
      labels:
        {{- include "aeterna.opal.labels" . | nindent 8 }}
        {{- include "aeterna.opal.cedarAgent.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "aeterna.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: opal-client-cedar
          image: "{{ .Values.opal.cedarAgent.image.repository }}:{{ .Values.opal.cedarAgent.image.tag }}"
          imagePullPolicy: {{ .Values.opal.cedarAgent.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: opal-client
              containerPort: {{ .Values.opal.cedarAgent.httpPort }}
              protocol: TCP
            - name: cedar
              containerPort: {{ .Values.opal.cedarAgent.oidcPort }}
              protocol: TCP
          env:
            - name: OPAL_SERVER_URL
              value: "http://{{ include "aeterna.fullname" . }}-opal-server:{{ .Values.opal.server.httpPort }}"
            - name: OPAL_CLIENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "aeterna.fullname" . }}-opal
                  key: client-token
            - name: OPAL_INLINE_CEDAR_ENABLED
              value: "true"
            - name: OPAL_INLINE_CEDAR_CONFIG
              value: '{"addr": "0.0.0.0", "port": {{ .Values.opal.cedarAgent.oidcPort }}}'
            - name: OPAL_LOG_LEVEL
              value: "INFO"
          livenessProbe:
            httpGet:
              path: /health
              port: cedar
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: cedar
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          resources:
            {{- toYaml .Values.opal.cedarAgent.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cedar-data
              mountPath: /data
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cedar-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aeterna.fullname" . }}-cedar-agent
  labels:
    {{- include "aeterna.opal.labels" . | nindent 4 }}
    {{- include "aeterna.opal.cedarAgent.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.opal.cedarAgent.httpPort }}
      targetPort: opal-client
      protocol: TCP
      name: opal-client
    - port: {{ .Values.opal.cedarAgent.oidcPort }}
      targetPort: cedar
      protocol: TCP
      name: cedar
  selector:
    {{- include "aeterna.opal.cedarAgent.selectorLabels" . | nindent 4 }}
{{- end }}
