apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "aeterna.fullname" . }}-test-connection"
  labels:
    {{- include "aeterna.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: test-aeterna
      image: curlimages/curl:8.5.0
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      command:
        - sh
        - -c
        - |
          set -e
          echo "Testing Aeterna health endpoint..."
          curl -s http://{{ include "aeterna.fullname" . }}:{{ .Values.aeterna.service.port }}/health || true
          echo "Aeterna health endpoint is reachable"
    {{- if .Values.postgresql.host }}
    - name: test-postgresql
      image: postgres:16-alpine
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      command:
        - sh
        - -c
        - |
          set -e
          echo "Testing PostgreSQL connection..."
          pg_isready -h {{ .Values.postgresql.host }} -p {{ .Values.postgresql.port | default 5432 }}
          echo "PostgreSQL is ready!"
    {{- end }}
    {{- if and (eq .Values.vectorStore.type "qdrant") .Values.vectorStore.host }}
    - name: test-qdrant
      image: curlimages/curl:8.5.0
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      command:
        - sh
        - -c
        - |
          set -e
          echo "Testing Qdrant connection..."
          curl -sf http://{{ .Values.vectorStore.host }}:{{ .Values.vectorStore.port | default 6333 }}/readyz
          echo "Qdrant is ready!"
    {{- end }}
    {{- if .Values.opal.enabled }}
    - name: test-opal
      image: curlimages/curl:8.5.0
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      command:
        - sh
        - -c
        - |
          set -e
          echo "Testing OPAL Server connection..."
          curl -sf http://{{ include "aeterna.fullname" . }}-opal-server:7002/healthcheck
          echo "OPAL Server is ready!"
    {{- end }}
