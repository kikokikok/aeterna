name: Tenant Provisioning Consistency Matrix

# B2 §13.6 — the consistency matrix runs every fixture in
# `tests/tenant_provisioning/scenarios/` through every available
# runner and asserts they all produce the same rendered tenant
# state.
#
# Current runners:
#   - api  (§13.2): cargo test --test tenant_provisioning_consistency_test
#                  In-process router, testcontainer Postgres.
#   - cli  (§13.3): cargo test --test tenant_provisioning_consistency_cli_test
#                  Same router bound on 127.0.0.1:0, real `aeterna`
#                  binary spawned via tokio::process::Command, HS256
#                  JWT minted in-test and exported as AETERNA_API_TOKEN.
#   - ui   (§13.4): TODO — Playwright drives the admin-ui wizard.
#                  Tracked, not yet wired.
#
# When the ui runner lands it gets added to the matrix below as the
# `ui` axis. Until then the matrix carries `api` + `cli`.

on:
  pull_request:
    branches: [master]
    paths:
      - "cli/**"
      - "crates/**"
      - "tests/tenant_provisioning/**"
      - ".github/workflows/tenant-provisioning-matrix.yml"
  push:
    branches: [master]
    paths:
      - "cli/**"
      - "crates/**"
      - "tests/tenant_provisioning/**"

jobs:
  consistency-matrix:
    name: ${{ matrix.runner }} runner
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Add `ui` here once §13.4 lands.
        runner: [api, cli]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          shared-key: tenant-consistency

      - name: Verify Docker is available (testcontainers prerequisite)
        run: docker info

      - name: Run api runner
        if: matrix.runner == 'api'
        run: cargo test --test tenant_provisioning_consistency_test --release -- --test-threads=1 --nocapture
        working-directory: cli
        env:
          RUST_BACKTRACE: "1"

      - name: Run cli runner
        if: matrix.runner == 'cli'
        run: cargo test --test tenant_provisioning_consistency_cli_test --release -- --test-threads=1 --nocapture
        working-directory: cli
        env:
          RUST_BACKTRACE: "1"

      # Future runners go here:
      # - name: Run ui runner
      #   if: matrix.runner == 'ui'
      #   run: ...
