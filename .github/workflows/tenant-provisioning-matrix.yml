name: Tenant Provisioning Consistency Matrix

# B2 §13.6 — the consistency matrix runs every fixture in
# `tests/tenant_provisioning/scenarios/` through every available
# runner and asserts they all produce the same rendered tenant
# state.
#
# Current runners:
#   - api  (§13.2): cargo test --test tenant_provisioning_consistency_test
#                  In-process router, testcontainer Postgres.
#   - cli  (§13.3): cargo test --test tenant_provisioning_consistency_cli_test
#                  Same router bound on 127.0.0.1:0, real `aeterna`
#                  binary spawned via tokio::process::Command, HS256
#                  JWT minted in-test and exported as AETERNA_API_TOKEN.
#   - ui   (§13.4): cd admin-ui && npx playwright test tenant-consistency-runner
#                  Hermetic Playwright spec. Walks every fixture
#                  through the Manifest tab and asserts the YAML
#                  serializer (`manifestToYaml`) round-trips slug,
#                  name, generation, scenario label, every
#                  `config.fields` key, every `config.secretReferences`
#                  logical name, every top-level `hierarchy[*].name`,
#                  and that the download filename matches
#                  `<slug>.manifest.redacted.yaml`. No backend, no
#                  Docker — Vite dev server + page.route() mocks only.

on:
  pull_request:
    branches: [master]
    paths:
      - "cli/**"
      - "crates/**"
      - "admin-ui/**"
      - "tests/tenant_provisioning/**"
      - ".github/workflows/tenant-provisioning-matrix.yml"
  push:
    branches: [master]
    paths:
      - "cli/**"
      - "crates/**"
      - "admin-ui/**"
      - "tests/tenant_provisioning/**"

jobs:
  consistency-matrix:
    name: ${{ matrix.runner }} runner
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runner: [api, cli, ui]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Rust-runner setup (api / cli only) -----------------------
      - name: Install Rust toolchain
        if: matrix.runner != 'ui'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: matrix.runner != 'ui'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          shared-key: tenant-consistency

      - name: Verify Docker is available (testcontainers prerequisite)
        if: matrix.runner != 'ui'
        run: docker info

      - name: Run api runner
        if: matrix.runner == 'api'
        run: cargo test --test tenant_provisioning_consistency_test --release -- --test-threads=1 --nocapture
        working-directory: cli
        env:
          RUST_BACKTRACE: "1"

      - name: Run cli runner
        if: matrix.runner == 'cli'
        run: cargo test --test tenant_provisioning_consistency_cli_test --release -- --test-threads=1 --nocapture
        working-directory: cli
        env:
          RUST_BACKTRACE: "1"

      # ---- UI-runner setup (Playwright, no backend) -----------------
      - name: Setup Node
        if: matrix.runner == 'ui'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin-ui/package-lock.json

      - name: Install admin-ui deps
        if: matrix.runner == 'ui'
        run: npm ci
        working-directory: admin-ui

      - name: Install Playwright chromium
        if: matrix.runner == 'ui'
        run: npx playwright install chromium --with-deps
        working-directory: admin-ui

      - name: Run ui runner
        if: matrix.runner == 'ui'
        run: npx playwright test tenant-consistency-runner --reporter=list
        working-directory: admin-ui

      - name: Upload Playwright report on failure
        if: failure() && matrix.runner == 'ui'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ui-runner
          path: admin-ui/playwright-report/
          retention-days: 7
