name: PR Integration Gate

on:
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write        # required for registry-scoped buildx cache
  checks: write          # EnricoMi/publish-unit-test-result-action → create check runs
  pull-requests: write   # attach test summary to the PR

concurrency:
  group: pr-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Shipped-path smoke tests — exercises the exact binary paths a user hits
  # via `aeterna serve`, migrations, `check`, `sync`, `codesearch`.
  # Emits JUnit XML so failures show in the PR summary, not just the raw log.
  # ──────────────────────────────────────────────────────────────────────
  shipped-smoke:
    name: shipped-smoke
    runs-on: ubuntu-latest
    steps:
      # GitHub-hosted runners ship with ~14 GB free. Two sequential Rust
      # test-binary compiles (cli_e2e_test + agent-a2a::a2a_test, which
      # transitively vendors libduckdb-sys ~ 4-5 GB of C++) fill the disk
      # and the second `ar` invocation dies with ENOSPC. Freeing ~35 GB
      # of preinstalled Android/dotnet/ghc images up front is the
      # standard workaround.
      - name: Free runner disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false      # keep rustup/cargo bits cached by the runner
          android: true
          dotnet: true
          haskell: true
          large-packages: false  # apt purge is slow; skip
          swap-storage: true
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pr-shipped-smoke
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: CLI entrypoints + fail-closed smoke tests
        # Nextest filterset (`-E`) is explicit about which modules to run.
        # Bare positional args resolve to substring matches that can fail
        # silently when the target test is renamed — filtersets don't.
        run: |
          cargo nextest run --profile ci -p aeterna --test cli_e2e_test \
            -E 'test(/serve_and_migration_entrypoints/) + test(/check_subcommand/) + test(/sync_subcommand/) + test(/codesearch_runtime_subcommand/)'
      - name: Agent-a2a runtime smoke tests
        run: cargo nextest run --profile ci -p agent-a2a --test a2a_test
      - name: Publish test summary
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          check_name: "Shipped-smoke tests"
          junit_files: "target/nextest/ci/junit.xml"
          comment_mode: off
          job_summary: true
      - name: Upload JUnit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-shipped-smoke
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────
  # Docker build validation — full multi-arch release flow, scoped to this PR.
  #
  # Mirrors post-merge.yml::docker-publish end to end:
  #   1. docker-build matrix: native per-arch build, push-by-digest to GHCR
  #      (amd64 on ubuntu-latest, arm64 on native ubuntu-24.04-arm — no QEMU).
  #      Both arches run in parallel → wall-clock ≈ max(amd64, arm64).
  #   2. docker-manifest: buildx imagetools create merges both digests into
  #      a single multi-arch manifest under tag `pr-{PR_NUMBER}`.
  #      This is the step that would previously only run post-merge, so any
  #      manifest-level regression (platform mismatch, media-type drift,
  #      attestation schema change) surfaces on the PR, not after merge.
  #
  # Why push to GHCR from a PR: buildx imagetools create needs real registry
  # digests to merge. `pr-{N}` is a throwaway tag, untagged when the PR
  # closes via the cleanup job below. Cache refs are per-arch and fall
  # through to buildcache-master-{arch} seeded by post-merge.yml.
  # ──────────────────────────────────────────────────────────────────────
  docker-build:
    name: docker-build-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    # First build after a cold cache is ~30 min (full Rust release build).
    # After post-merge.yml seeds ghcr.io/{repo}-cache:buildcache-master-{arch},
    # subsequent PR builds pull warm layers and finish in <10 min.
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-cache:buildcache-${{ matrix.arch }}
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-cache:buildcache-master-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-cache:buildcache-${{ matrix.arch }},mode=max,image-manifest=true,oci-mediatypes=true
          build-args: |
            RUST_VERSION=1.93
            BUILD_DATE=${{ github.event.pull_request.updated_at }}
            VCS_REF=${{ github.sha }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: pr-digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: docker multi-arch manifest
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: pr-digests-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create & push multi-arch manifest (pr-${{ github.event.pull_request.number }})
        working-directory: /tmp/digests
        run: |
          set -eo pipefail
          tag="${REGISTRY}/${IMAGE_NAME}:pr-${{ github.event.pull_request.number }}"
          docker buildx imagetools create \
            -t "$tag" \
            $(printf "${REGISTRY}/${IMAGE_NAME}@sha256:%s " *)
          echo "Pushed multi-arch manifest: $tag"
      - name: Verify manifest lists both platforms
        run: |
          set -eo pipefail
          tag="${REGISTRY}/${IMAGE_NAME}:pr-${{ github.event.pull_request.number }}"
          platforms=$(docker buildx imagetools inspect "$tag" --raw \
            | jq -r '.manifests[] | "\(.platform.os)/\(.platform.architecture)"' \
            | sort -u)
          echo "Manifest platforms: $platforms"
          echo "$platforms" | grep -q '^linux/amd64

  # Wave 2c will expand this file with:
  # - integration-rust (postgres/redis/qdrant service containers)
  # - k8s-e2e (kind + helm install)
  # - cross-tests/phase1_ha, memory_throughput --quick

          echo "$platforms" | grep -q '^linux/arm64

