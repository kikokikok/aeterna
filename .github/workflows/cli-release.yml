name: CLI Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: aeterna
            archive: aeterna-x86_64-linux.tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary: aeterna
            archive: aeterna-aarch64-linux.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: aeterna
            archive: aeterna-x86_64-macos.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: aeterna
            archive: aeterna-aarch64-macos.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools
          # aarch64 cross-compiler
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          fi

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --package aeterna --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          BINARY_PATH="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          strip "$BINARY_PATH" || true
          tar -czf "${{ matrix.archive }}" -C "$(dirname "$BINARY_PATH")" "${{ matrix.binary }}"

      - name: Compute checksum
        shell: bash
        run: sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Combine checksums
        run: cat *.sha256 > checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            aeterna-*.tar.gz
            aeterna-*.tar.gz.sha256
            checksums.sha256
