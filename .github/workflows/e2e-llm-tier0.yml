name: e2e LLM tier 0 (ollama)

on:
  pull_request:
    paths:
      - 'e2e/llm/**'
      - 'e2e/tools/mock-llm-server.py'
      - 'e2e/fixtures/llm/**'
      - 'memory/src/llm/**'
      - 'memory/src/embedding/**'
      - '.github/workflows/e2e-llm-tier0.yml'
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  contract-test:
    name: Adapter contract
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run contract test
        run: |
          mkdir -p .e2e
          set -euo pipefail
          ./e2e/llm/contract-test.sh 2>&1 | tee .e2e/contract-test.log
      - name: Upload contract-test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-llm-tier0-contract-test-logs
          path: .e2e/contract-test.log
          if-no-files-found: warn
          retention-days: 7

  ollama-smoke:
    name: Ollama adapter smoke (real inference)
    runs-on: ubuntu-24.04
    services:
      ollama:
        image: ollama/ollama:latest
        ports: ['11434:11434']
    steps:
      - uses: actions/checkout@v4
      - name: Cache Ollama model blob
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-model-qwen2.5-0.5b-v1
      - name: Provision + health
        env:
          AETERNA_E2E_OLLAMA_HOST: http://localhost:11434
        run: |
          mkdir -p .e2e
          set -euo pipefail
          {
            ./e2e/llm/ollama.sh provision
            ./e2e/llm/ollama.sh env
            ./e2e/llm/ollama.sh health
          } 2>&1 | tee .e2e/ollama-smoke.log
        shell: bash
      - name: Cleanup (best-effort)
        if: always()
        run: ./e2e/llm/ollama.sh cleanup || true
      - name: Upload ollama-smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-llm-tier0-ollama-smoke-logs
          path: .e2e/**/*.log
          if-no-files-found: warn
          retention-days: 7

  recorded-replay:
    name: Recorded-fixture adapter replay
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Provision + replay one fixture
        run: |
          mkdir -p .e2e
          set -euo pipefail
          {
            ./e2e/llm/recorded.sh provision
            ./e2e/llm/recorded.sh env > /tmp/llm.env
            # shellcheck disable=SC1091
            set -a; source /tmp/llm.env; set +a
            curl -fsS "$AETERNA_OPENAI_BASE_URL/chat/completions" \
              -H 'Content-Type: application/json' \
              -d '{"messages":[{"role":"user","content":"ping"}],"model":"qwen2.5:0.5b"}' \
              | grep -q '"pong"'
            ./e2e/llm/recorded.sh cleanup
          } 2>&1 | tee .e2e/recorded-replay.log
        shell: bash
      - name: Cleanup recorded mock server (best-effort)
        if: always()
        run: ./e2e/llm/recorded.sh cleanup || true
      - name: Upload recorded-replay logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-llm-tier0-recorded-replay-logs
          path: .e2e/**/*.log
          if-no-files-found: warn
          retention-days: 7
      - name: Upload recorded HTTP traffic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-llm-tier0-recorded-http-traffic
          path: .e2e/llm-recorded-traffic.ndjson
          if-no-files-found: warn
          retention-days: 7
