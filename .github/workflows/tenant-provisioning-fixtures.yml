name: Tenant Provisioning Fixtures

# B2 §13.7 — client-local structural pre-check for the
# `tests/tenant_provisioning/scenarios/` fixture set.
#
# This job is intentionally server-less: it runs only jq against the
# checked-in JSON fixtures. The full 3-runner consistency matrix
# (§13.2–§13.6) is gated on §12 (Admin UI wizard) and §10.2
# (service-token minter in production use); when both land, a
# sibling `tenant-provisioning-matrix.yml` workflow will spin up
# a Postgres + aeterna server and run the CLI / API / UI runners.

on:
  pull_request:
    branches: [master]
    paths:
      - "tests/tenant_provisioning/**"
      - ".github/workflows/tenant-provisioning-fixtures.yml"
  push:
    branches: [master]
    paths:
      - "tests/tenant_provisioning/**"

jobs:
  fixtures-structural:
    name: Structural validation (jq, no server)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure jq is installed
        run: jq --version

      - name: Run structural validator
        run: ./tests/tenant_provisioning/run_validate.sh
