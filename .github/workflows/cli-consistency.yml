name: CLI Consistency

on:
  push:
    branches: [master]
    paths:
      - "cli/**"
      - "docs/guides/cli-quick-reference.md"
      - "install.sh"
      - ".github/workflows/cli-consistency.yml"
  pull_request:
    branches: [master]
    paths:
      - "cli/**"
      - "docs/guides/cli-quick-reference.md"
      - "install.sh"
      - ".github/workflows/cli-consistency.yml"

jobs:
  cli-consistency:
    name: CLI Consistency Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cli-consistency-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cli-consistency-cargo-

      - name: Build CLI (debug)
        run: cargo build --package aeterna

      - name: Check install.sh is executable and has no syntax errors
        run: sh -n install.sh

      - name: Check install.sh references correct binary name
        run: |
          grep -q 'BINARY="aeterna"' install.sh
          echo "Binary name in install.sh: OK"

      - name: Check install.sh covers all four target platforms
        run: |
          grep -q 'x86_64' install.sh
          grep -q 'aarch64' install.sh
          grep -q 'linux' install.sh
          grep -q 'macos' install.sh
          echo "Platform coverage in install.sh: OK"

      - name: Check cli-release.yml covers all four target platforms
        run: |
          grep -q 'x86_64-unknown-linux-musl' .github/workflows/cli-release.yml
          grep -q 'aarch64-unknown-linux-musl' .github/workflows/cli-release.yml
          grep -q 'x86_64-apple-darwin'        .github/workflows/cli-release.yml
          grep -q 'aarch64-apple-darwin'        .github/workflows/cli-release.yml
          echo "Platform coverage in cli-release.yml: OK"

      - name: Verify docs reference binary install path
        run: |
          grep -q 'install.sh' docs/guides/cli-quick-reference.md
          grep -q 'install.sh' README.md
          echo "Docs reference binary install path: OK"

      - name: Verify docs reference auth login
        run: |
          grep -q 'auth login' docs/guides/cli-quick-reference.md
          grep -q 'auth login' README.md
          echo "Docs reference auth login: OK"

      - name: Verify CLI binary supports auth subcommand
        run: |
          ./target/debug/aeterna auth --help | grep -q 'login'
          ./target/debug/aeterna auth --help | grep -q 'logout'
          ./target/debug/aeterna auth --help | grep -q 'status'
          echo "auth subcommand surface: OK"

      - name: Verify CLI binary supports config subcommand
        run: |
          ./target/debug/aeterna config --help | grep -q 'show'
          ./target/debug/aeterna config --help | grep -q 'set'
          ./target/debug/aeterna config --help | grep -q 'validate'
          echo "config subcommand surface: OK"

      - name: Verify CLI binary reports version
        run: |
          ./target/debug/aeterna --version | grep -q 'aeterna'
          echo "version flag: OK"

      - name: Run CLI E2E scenario tests
        run: cargo test --test cli_e2e_test "scenario" -- --test-threads=4
