# Production environment overlay
# Apply over base chart values: helm upgrade aeterna ... -f charts/aeterna/values.yaml -f deploy/overlays/production/values.yaml

deploymentMode: local

aeterna:
  enabled: true
  replicaCount: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
  pdb:
    enabled: true
    minAvailable: 2
  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: aeterna.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: aeterna-tls
        hosts:
          - aeterna.example.com

observability:
  logging:
    level: info
    format: json

networkPolicy:
  enabled: true
