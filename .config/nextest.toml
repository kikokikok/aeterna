# Nextest profiles used by CI. Invoke with: cargo nextest run --profile ci

[profile.default]
fail-fast = false
retries   = 0

[profile.ci]
fail-fast = false
retries   = 1
slow-timeout = { period = "60s", terminate-after = 4 }
failure-output = "immediate-final"
success-output = "never"

[profile.ci.junit]
path        = "junit.xml"
report-name = "nextest"
store-success-output = false
store-failure-output = true
